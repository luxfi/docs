name: Deploy Docs
on:
  push:
    branches:
    - main
  workflow_dispatch: null
permissions:
  contents: read
  packages: write
  id-token: write
concurrency:
  group: deploy-docs
  cancel-in-progress: true
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: luxfi/lux-docs
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to cluster
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.K8S_HOST }}
        username: ${{ secrets.K8S_USER }}
        key: ${{ secrets.K8S_SSH_KEY }}
        script: |
          kubectl rollout restart deployment/lux-docs -n lux-ns
